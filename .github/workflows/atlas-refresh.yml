name: ATLAS Refresh Validation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  validate-atlas-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate current ATLAS mapping
        run: pytest tests/test_mitre_atlas_mapping.py tests/test_atlas_refresh.py

      - name: Refresh ATLAS mapping into temporary file
        run: |
          python scripts/refresh_mitre_atlas.py \
            --source config/mitre_atlas_source_fixture.yaml \
            --existing config/mitre_atlas_mapping.yaml \
            --output reports/output/mitre_atlas_mapping.refresh-check.yaml

      - name: Upload refresh check artifact
        uses: actions/upload-artifact@v4
        with:
          name: vulnoraiq-atlas-refresh-check
          path: reports/output/mitre_atlas_mapping.refresh-check.yaml
