<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">VulnoraIQ Web UI light theme dashboard screenshot</title>
  <desc id="desc">Reference screenshot of the VulnoraIQ sophisticated muted light Web UI showing scan configuration, live progress, completed dashboard, findings, and recent scans.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2A2F35" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F9FA"/>
      <stop offset="0.55" stop-color="#F4F1F1"/>
      <stop offset="1" stop-color="#EEF2F3"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E8DFE0"/>
    </linearGradient>
    <style>
      .bg { fill: url(#canvas); }
      .panel { fill: #FFFFFF; stroke: rgba(42,47,53,0.14); stroke-width: 1; filter: url(#shadow); }
      .soft { fill: rgba(232,223,224,0.48); stroke: rgba(42,47,53,0.12); stroke-width: 1; }
      .navy { fill: #1E2229; }
      .text { fill: #2A2F35; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .muted { fill: #68737D; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .label { fill: #68737D; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 800; letter-spacing: 0.08em; }
      .heading { fill: #1E2229; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 900; }
      .badge-text { fill: #FFFFFF; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 900; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; }
      .medium { font-size: 18px; }
      .large { font-size: 32px; }
    </style>
  </defs>

